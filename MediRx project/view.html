<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediPrescript - View Prescription</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Times+New+Roman&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            position: relative;
            min-height: 100vh; 
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            /* Deep Purple to Light Pink Gradient */
            background: linear-gradient(135deg, #2e1065 0%, #701a75 40%, #fbcfe8 100%);
            background-size: cover;
            background-attachment: fixed;
            line-height: 1.6;
            color: #111111;
        }

        /* GLASS NAVBAR OVERLAY */
        .navbar { 
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 1rem 2rem; 
            border-radius: 20px; 
            margin-bottom: 2rem; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 5.8in;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-title {
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .nav-back-btn {
            padding: 0.5rem 1.2rem; 
            font-size: 0.9rem; 
            background: rgba(255, 255, 255, 0.2); 
            color: white; 
            text-decoration: none; 
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-back-btn:hover {
            background: #ffffff;
            color: #7028e4;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .main-container { 
            max-width: 5.8in; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* CLEAN PROFESSIONAL A5 SLIP SHEET CONTAINER */
        .prescription-container {
            background: #ffffff !important;
            width: 5.8in; /* Hardcoded A5 Metric specs */
            min-height: 8.3in;
            padding: 0.6in 0.5in;
            margin-bottom: 2rem;
            font-family: 'Times New Roman', Times, serif;
            font-size: 12px;
            line-height: 1.4;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
            position: relative;
            color: #222222;
            border-radius: 12px; 
        }

        /* 4 TO 5 LINES LETTERHEAD SPACING SYSTEM */
        .letterhead-space {
            height: 1.1in; 
            margin-bottom: 1.1rem;
        }

        /* FORMAL MINIMALIST PRESCRIPTION MARKUPS */
        .prescription-header {
            padding-bottom: 0.3rem;
            margin-bottom: 1.5rem; 
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .clinic-brand {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
            color: #111111;
        }

        .date-display {
            font-size: 13px;
            font-weight: bold;
        }
        
        /* PATIENT METADATA DISPLAY WITH LARGER FONTS & SPACING ADJUSTMENTS */
        .patient-meta-inline {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.8rem; 
            font-size: 17px; /* Increased by 2px */
            padding-bottom: 0.4rem;
        }

        .patient-name-wrapper {
            padding-left: 1.7rem; /* Space added before patient name */
        }

        .patient-mrd-wrapper {
            padding-right: 1.7rem; /* Space added after MRD No */
        }

        .meta-label {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 15px; /* Increased by 2px */
            color: #444444;
        }

        .section-title { 
            font-weight: bold; 
            margin: 2rem 0 0.8rem 0; 
            color: #111111; 
            font-size: 17px; 
            text-transform: uppercase;
            padding-bottom: 2px;
            letter-spacing: 0.5px;
        }

        /* HORIZONTAL LAB LAYOUT WITH CUSTOM ASYMMETRICAL MARGINS (TAB EDITS) */
        .lab-horizontal-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.8rem; 
            font-size: 16px;
            font-style: bold;
            padding: 0.2rem 0;
        }

        .lab-hc-wrap {
            margin-left: 2.5rem; 
        }

        .lab-vitd-wrap {
            margin-right: 2.5rem; 
        }

        /* MEDICATION TEXT CONTAINER LAYOUT */
        .medications-block {
            margin-bottom: 1.2rem;
        }

        .medication-entry {
            margin-bottom: 0.8rem; 
            line-height: 1.5;
        }

        .value-highlight {
            font-weight: bold;
            color: #000000;
        }

        .footer { 
            position: absolute; 
            bottom: 0.4in; 
            left: 0.5in;
            right: 0.5in;
            font-size: 10px; 
            color: #777777; 
            border-top: 1px solid #eeeeee;
            padding-top: 4px;
            display: flex;
            justify-content: space-between;
        }

        /* GLASS LAYOUT ACTION BUTTONS */
        .action-buttons { 
            display: flex; 
            gap: 1rem; 
            justify-content: center; 
            flex-wrap: wrap; 
            max-width: 5.8in; 
            width: 100%;
            margin-bottom: 3rem;
        }

        .btn { 
            padding: 1rem 1.5rem; 
            border: none; 
            border-radius: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
            text-decoration: none; 
            font-size: 0.95rem; 
        }

        .btn-primary { 
            background: #ffffff; 
            color: #7028e4; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .btn-primary:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            background: #fdfdfd;
        }

        .btn-secondary { 
            background: rgba(255, 255, 255, 0.15); 
            color: white; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* HARDWARE SYSTEM PRINT OVERRIDES */
        @media print {
            body { 
                background: none !important; 
                padding: 0 !important; 
            }
            .prescription-container { 
                box-shadow: none !important; 
                border: none !important; 
                width: 5.8in !important; 
                height: 8.3in !important; 
                padding: 0.4in 0.4in !important; 
                margin: 0 !important; 
                position: static !important; 
                border-radius: 0px !important;
            }
            .action-buttons, .navbar { 
                display: none !important; 
            }
            @page { 
                size: A5; 
                margin: 0; 
            }
        }

        @media (max-width: 768px) {
            .main-container, .navbar { 
                max-width: 100%; 
            }
            .prescription-container { 
                width: 100%; 
                min-height: auto; 
            }
            .action-buttons { 
                flex-direction: column; 
                width: 100%;
            }
            .btn { 
                width: 100%; 
                justify-content: center; 
            }
        }
    </style>
</head>
<body>

    <!-- OVERLAY NAV -->
    <nav class="navbar">
        <div class="navbar-title"><i class="fas fa-eye"></i> View Slip</div>
        <a href="list.html" class="nav-back-btn">
            <i class="fas fa-arrow-left"></i> History Records
        </a>
    </nav>

    <div class="main-container">
        <!-- WHITE PRINT SLIP CONTAINER -->
        <div id="prescriptionContent" class="prescription-container">
            
            <!-- RESERVED LETTERHEAD SPACE -->
            <div class="letterhead-space"></div>
            
            <div class="prescription-header">
                <div class="clinic-brand"> </div>
                <div class="date-display">Date: <span id="prescriptionDate">-</span></div>
            </div><br>
            
            <!-- Patient details styled with custom spacing alignments and fixed size jumps -->
            <div class="patient-meta-inline">
                <div class="patient-name-wrapper"><span class="meta-label">Patient Name:</span> <span id="patientName" style="font-weight: bold; font-size: 18px;">-</span></div>
                <div class="patient-mrd-wrapper"><span class="meta-label">MRD No:</span> <span id="prescriptionMrd" style="font-weight: bold; font-size: 18px;">-</span></div>
            </div>

            <!-- Lab Results Row with padding elements replicating custom tab markers -->
            <div class="section-title"></div>
            <div class="lab-horizontal-row">
                <div class="lab-hc-wrap">HC: <span id="labHc" class="value-highlight">-</span> g/dL</div>
                <div>Fe: <span id="labFe" class="value-highlight">-</span> ng/mL</div>
                <div class="lab-vitd-wrap">Vit D: <span id="labVitD" class="value-highlight">-</span> ng/mL</div>
            </div>

            <!-- Medications Listing -->
            <div class="section-title"></div>
            <div id="medicationRows" class="medications-block">
                <div style="color: #666;">Processing metrics...</div>
            </div>

            <div class="footer">
                <div>Printed: <span id="generatedTime">-</span></div>
            </div>
        </div>

        <!-- Glass Actions Container -->
        <div class="action-buttons">
            <button onclick="printCurrent()" class="btn btn-primary">
                <i class="fas fa-print"></i> Print Document (A5)
            </button>
            <a href="generate.html" class="btn btn-secondary">
                <i class="fas fa-plus"></i> New Sheet
            </a>
            <a href="list.html" class="btn btn-secondary">
                <i class="fas fa-list"></i> View History
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const index = localStorage.getItem('currentPrescriptionIndex');
            const prescriptions = JSON.parse(localStorage.getItem('prescriptions') || '[]');
            
            if (index !== null && prescriptions[parseInt(index)]) {
                displayPrescription(prescriptions[parseInt(index)]);
            } else {
                document.getElementById('prescriptionContent').innerHTML = 
                    '<div style="text-align: center; padding: 3rem; font-family: sans-serif;">' +
                    '<i class="fas fa-exclamation-triangle" style="font-size: 2.5rem; color: #ff6b6b; margin-bottom:1rem;"></i>' +
                    '<h3>No Prescription Selected</h3><p style="margin-top:0.5rem;"><a href="list.html" style="color:#ffffff; text-decoration:underline;">Return to History</a></p>' +
                    '</div>';
            }
        });

        function generateMedications(prescription) {
            const medications = [];
            
            const hc = parseFloat(prescription.hc !== undefined ? prescription.hc : prescription.hcValue);
            const fe = parseFloat(prescription.fe !== undefined ? prescription.fe : prescription.feValue);
            const vitd = parseFloat(prescription.vitd !== undefined ? prescription.vitd : prescription.vitdValue);

            // HC (Hemoglobin) Logic
            if (!isNaN(hc)) {
                if (hc <= 7) {
                    medications.push({ name: "subneuro B6 / Matilda forte / ME 12", dosage: "OD", duration: "For Vit B12 management" });
                    medications.push({ name: "upracal / Celol / Xtracal", dosage: "BD", duration: "Calcium supplementation" });
                } else if (hc > 20) {
                    medications.push({ name: "Inj. Nervijen 1500 plus", dosage: "Once a week", duration: "For 6 weeks (Vit B12)" });
                }
            }

            // Fe (Ferritin) Logic
            if (!isNaN(fe)) {
                if (fe <= 20) {
                    medications.push({ name: "Inj. Irny 1 gm / Ferium 1 gm", dosage: "Once in 15 days", duration: "For 3 doses" });
                } else if (fe > 20 && fe < 30) {
                    medications.push({ name: "Inj. Irny 1 gm / Ferium 1 gm", dosage: "Once in 15 days", duration: "For 2 doses" });
                } else if (fe >= 30) {
                    medications.push({ name: "orofer XT / livogen / Autrin", dosage: "OD", duration: "Oral Maintenance" });
                }
            }

            // Vit D Logic
            if (!isNaN(vitd)) {
                if (vitd <= 10) {
                    medications.push({ name: "Inj. Arachitol 6 LU", dosage: "Once a week", duration: "For 5 weeks, then Uprise/Tayo 60k monthly" });
                } else if (vitd > 10 && vitd < 20) {
                    medications.push({ name: "Inj. Arachitol 6 LU", dosage: "Once a week", duration: "For 3 weeks, then Uprise/Tayo 60k monthly" });
                } else if (vitd >= 20) {
                    medications.push({ name: "Inj. Arachitol 6 LU", dosage: "Single Dose", duration: "Once a week single booster, then 60k monthly" });
                }
            }

            if (medications.length === 0) {
                medications.push({ name: "No therapeutic modifications required", dosage: "-", duration: "Routine review" });
            }

            return medications;
        }

        function displayPrescription(prescription) {
            const rawDate = prescription.date || prescription.visitDate;
            document.getElementById('prescriptionDate').textContent = rawDate ? new Date(rawDate).toLocaleDateString('en-GB') : '-';
            document.getElementById('prescriptionMrd').textContent = prescription.mrd || prescription.patientMrd || 'N/A';
            document.getElementById('patientName').textContent = prescription.name || prescription.patientName || 'N/A';
            
            document.getElementById('labHc').textContent = prescription.hc !== 'N/A' ? (prescription.hc || prescription.hcValue || '-') : '-';
            document.getElementById('labFe').textContent = prescription.fe !== 'N/A' ? (prescription.fe || prescription.feValue || '-') : '-';
            document.getElementById('labVitD').textContent = prescription.vitd !== 'N/A' ? (prescription.vitd || prescription.vitdValue || '-') : '-';
            
            const meds = generateMedications(prescription);
            const container = document.getElementById('medicationRows');
            
            container.innerHTML = meds.map((med, i) => `
                <div class="medication-entry">
                    <strong>${i + 1}. ${med.name}</strong> — ${med.dosage} (${med.duration})
                </div>
            `).join('');
            
            document.getElementById('generatedTime').textContent = new Date().toLocaleString('en-GB', { hour12: true });
        }

        function printCurrent() {
            window.print();
        }
    </script>
</body>
</html>
